<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chá de Casa Nova</title>

  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Great+Vibes&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="container">

  <header class="hero">
    <h1>Chá de</h1>
    <h2>Casa Nova</h2>

    <p>
      Um novo lar, novos sonhos e muitas histórias para viver.
      Escolha um presente abaixo para nos ajudar nessa nova fase ❤️
    </p>
  </header>

  <section style="background:#fffdfb;border:2px solid #e7c7a4;border-radius:20px;padding:18px;margin-bottom:18px;">
    <h3 style="color:#c26a32;margin-top:0;">🎁 Presentes da Lista</h3>
    <div id="lista" style="display:flex;flex-direction:column;gap:10px;">
      <p style="text-align:center;color:#999;">Carregando presentes...</p>
    </div>
  </section>

  <section class="categoria">
    <h3>🍳 COZINHA</h3>

    <label class="item"><input type="checkbox"> Jogo de panelas</label>
    <label class="item"><input type="checkbox"> Frigideira</label>
    <label class="item"><input type="checkbox"> Jogo de talheres</label>
    <label class="item"><input type="checkbox"> Jogo de pratos (raso, fundo e sobremesa)</label>
    <label class="item"><input type="checkbox"> Copos e taças</label>
    <label class="item"><input type="checkbox"> Xícaras de café</label>
    <label class="item"><input type="checkbox"> Potes (tipo tupperware)</label>
    <label class="item"><input type="checkbox"> Tábua de corte</label>
    <label class="item"><input type="checkbox"> Facas de cozinha</label>
    <label class="item"><input type="checkbox"> Utensílios (concha, espátula, escumadeira)</label>
    <label class="item"><input type="checkbox"> Ralador</label>
    <label class="item"><input type="checkbox"> Abridor de latas/garrafas</label>
    <label class="item"><input type="checkbox"> Panos de prato</label>
    <label class="item"><input type="checkbox"> Forma de bolo / assadeira</label>
  </section>

  <section class="categoria">
    <h3>🛋️ SALA E DECORAÇÃO</h3>

    <label class="item"><input type="checkbox"> Almofadas</label>
    <label class="item"><input type="checkbox"> Tapete</label>
    <label class="item"><input type="checkbox"> Cortina</label>
    <label class="item"><input type="checkbox"> Quadros ou porta-retratos</label>
    <label class="item"><input type="checkbox"> Vasos de planta</label>
    <label class="item"><input type="checkbox"> Luminária / abajur</label>
  </section>

  <section class="categoria">
    <h3>🛏️ QUARTO</h3>

    <label class="item"><input type="checkbox"> Jogo de cama</label>
    <label class="item"><input type="checkbox"> Lençóis</label>
    <label class="item"><input type="checkbox"> Travesseiros</label>
    <label class="item"><input type="checkbox"> Cobertor ou manta</label>
    <label class="item"><input type="checkbox"> Cabides</label>
  </section>

  <section class="categoria">
    <h3>🧴 BANHEIRO</h3>

    <label class="item"><input type="checkbox"> Toalhas (banho e rosto)</label>
    <label class="item"><input type="checkbox"> Tapete de banheiro</label>
    <label class="item"><input type="checkbox"> Porta-sabonete</label>
    <label class="item"><input type="checkbox"> Porta-escova de dentes</label>
    <label class="item"><input type="checkbox"> Lixeira</label>
  </section>

  <section class="categoria">
    <h3>🧹 LIMPEZA / ÁREA DE SERVIÇO</h3>

    <label class="item"><input type="checkbox"> Vassoura</label>
    <label class="item"><input type="checkbox"> Rodo</label>
    <label class="item"><input type="checkbox"> Balde</label>
    <label class="item"><input type="checkbox"> Pá de lixo</label>
    <label class="item"><input type="checkbox"> Panos de chão</label>
    <label class="item"><input type="checkbox"> Pregadores de roupa</label>
    <label class="item"><input type="checkbox"> Cesto de roupa</label>
  </section>

  <section class="categoria">
    <h3>❤️ EXTRAS</h3>

    <label class="item"><input type="checkbox"> Liquidificador</label>
    <label class="item"><input type="checkbox"> Cafeteira</label>
    <label class="item"><input type="checkbox"> Sanduicheira</label>
    <label class="item"><input type="checkbox"> Ferro de passar</label>
    <label class="item"><input type="checkbox"> Extensão / benjamin</label>
    <label class="item"><input type="checkbox"> Kit de ferramentas (martelo, chave de fenda)</label>
  </section>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";
import { 
  getFirestore, 
  collection, 
  doc, 
  onSnapshot, 
  updateDoc 
} from "https://www.gstatic.com/firebasejs/12.15.0/firebase-firestore.js";

// seu firebase config
const firebaseConfig = {
  apiKey: "AIzaSyAZsS6apxe2WM03YEbEn3iorM4tmueVCd8",
  authDomain: "cha-de-casa-nova-ana-e-danniel.firebaseapp.com",
  projectId: "cha-de-casa-nova-ana-e-danniel",
  storageBucket: "cha-de-casa-nova-ana-e-danniel.firebasestorage.app",
  messagingSenderId: "311408895947",
  appId: "1:311408895947:web:39d42763dec314164c784e"
};

// inicia firebase
const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// onde vai aparecer a lista no HTML
const lista = document.getElementById("lista");

console.log("Script carregado! Lista element:", lista);

// 🔥 ESCUTA EM TEMPO REAL
onSnapshot(collection(db, "presentes"), (snapshot) => {
  console.log("Presentes atualizados:", snapshot.docs.length);
  lista.innerHTML = "";

  snapshot.forEach((docItem) => {
    const data = docItem.data();
    console.log("Presente:", data.nome, "Reservado:", data.reservado);

    lista.innerHTML += `
      <div style="padding:10px;border:1px solid #ccc;margin:5px;border-radius:8px;background:${data.reservado ? '#f0f0f0' : '#fff'};">
        <p><strong>${data.nome}</strong></p>
        <button style="padding:8px 16px;background:${data.reservado ? '#ccc' : '#c26a32'};color:white;border:none;border-radius:4px;cursor:${data.reservado ? 'not-allowed' : 'pointer'};font-weight:bold;" ${data.reservado ? "disabled" : ""} onclick="window.reservar('${docItem.id}', event)">
          ${data.reservado ? "✓ Já escolhido" : "Escolher"}
        </button>
      </div>
    `;
  });
});

// 🔥 quando clicar no botão
window.reservar = async (id, event) => {
  event.preventDefault();
  event.stopPropagation();
  console.log("Clicou em:", id);
  
  const ref = doc(db, "presentes", id);

  try {
    await updateDoc(ref, {
      reservado: true
    });
    console.log("Presente reservado com sucesso!");
  } catch (error) {
    console.error("Erro ao reservar:", error);
  }
};
</script>

</body>
</html>

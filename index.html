<<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";
import { 
  getFirestore, 
  collection, 
  doc, 
  onSnapshot, 
  updateDoc 
} from "https://www.gstatic.com/firebasejs/12.15.0/firebase-firestore.js";

// seu firebase config (ok)
const firebaseConfig = {
  apiKey: "AIzaSyAZsS6apxe2WM03YEbEn3iorM4tmueVCd8",
  authDomain: "cha-de-casa-nova-ana-e-danniel.firebaseapp.com",
  projectId: "cha-de-casa-nova-ana-e-danniel",
  storageBucket: "cha-de-casa-nova-ana-e-danniel.firebasestorage.app",
  messagingSenderId: "311408895947",
  appId: "1:311408895947:web:39d42763dec314164c784e"
};

// inicia firebase
const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// onde vai aparecer a lista no HTML
const lista = document.getElementById("lista");

// 🔥 ESCUTA EM TEMPO REAL
onSnapshot(collection(db, "presentes"), (snapshot) => {
  lista.innerHTML = "";

  snapshot.forEach((docItem) => {
    const data = docItem.data();

    lista.innerHTML += `
      <div style="padding:10px;border:1px solid #ccc;margin:5px;">
        <p>${data.nome}</p>

        <button ${data.reservado ? "disabled" : ""}
          onclick="reservar('${docItem.id}')">

          ${data.reservado ? "Já escolhido" : "Escolher"}
        </button>
      </div>
    `;
  });
});

// 🔥 quando clicar no botão
window.reservar = async (id) => {
  const ref = doc(db, "presentes", id);

  await updateDoc(ref, {
    reservado: true
  });
};

</script>

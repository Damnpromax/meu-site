<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chá de Casa Nova</title>

  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Great+Vibes&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <style>
    /* Estilo para alinhar o botão ao lado do nome do presente */
    .presente-item {
      padding: 12px;
      border: 1px solid #eee;
      margin: 5px 0;
      border-radius: 8px;
      background: #fff;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
    }
    .btn-escolher {
      padding: 6px 12px;
      background: #c26a32;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-weight: bold;
      font-size: 0.85rem;
      transition: background 0.2s;
    }
    .btn-escolher:hover {
      background: #a45525;
    }
    .badge-escolhido {
      padding: 4px 8px;
      background: #2d8f2d;
      color: white;
      border-radius: 4px;
      font-size: 0.8rem;
      font-weight: bold;
    }
    .texto-escolhido {
      margin: 0;
      color: #777;
      text-decoration: line-through;
    }
  </style>
</head>
<body>
<div class="container">

  <header class="hero">
    <h1>Chá de</h1>
    <h2>Casa Nova</h2>

    <p>
      Um novo lar, novos sonhos e muitas histórias para viver.
      Escolha um presente abaixo para nos ajudar nessa nova fase ❤️
    </p>
  </header>

  <section style="background:#fffdfb;border:2px solid #e7c7a4;border-radius:20px;padding:18px;margin-bottom:18px;">
    <h3 style="color:#c26a32;margin-top:0;">🎁 Presentes da Lista</h3>
    <div style="display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:12px;">
      <div id="status" style="flex:1;padding:10px;border-radius:10px;background:#f8f5ee;color:#333;border:1px solid #e5d3c3;">Carregando presentes...</div>
      <button id="refreshButton" style="padding:10px 16px;background:#c26a32;color:white;border:none;border-radius:8px;cursor:pointer;">Atualizar</button>
    </div>
    <div style="display:flex;flex-wrap:wrap;gap:16px;">
      <div style="flex:1;min-width:280px;">
        <h4 style="margin-top:0;margin-bottom:8px;">Presentes disponíveis</h4>
        <div id="listaDisponiveis" style="display:flex;flex-direction:column;gap:5px;">
          <p style="text-align:center;color:#999;">Carregando presentes...</p>
        </div>
      </div>
      <div style="flex:1;min-width:280px;">
        <h4 style="margin-top:0;margin-bottom:8px;">Presentes já escolhidos</h4>
        <div id="listaEscolhidos" style="display:flex;flex-direction:column;gap:5px;">
          <p style="text-align:center;color:#999;">Nenhum presente escolhido ainda.</p>
        </div>
      </div>
    </div>
  </section>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";
import {
  getFirestore,
  collection,
  doc,
  onSnapshot,
  getDocs,
  updateDoc
} from "https://www.gstatic.com/firebasejs/12.15.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyAZsS6apxe2WM03YEbEn3iorM4tmueVCd8",
  authDomain: "cha-de-casa-nova-ana-e-danniel.firebaseapp.com",
  projectId: "cha-de-casa-nova-ana-e-danniel",
  storageBucket: "cha-de-casa-nova-ana-e-danniel.firebasestorage.app",
  messagingSenderId: "311408895947",
  appId: "1:311408895947:web:39d42763dec314164c784e"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const listaDisponiveis = document.getElementById("listaDisponiveis");
const listaEscolhidos = document.getElementById("listaEscolhidos");
const status = document.getElementById("status");
const refreshButton = document.getElementById("refreshButton");
let currentDocs = [];

const getPresentName = (data, id = "Presente") => {
  if (!data) return id;
  if (typeof data.nome === "string" && data.nome.trim()) return data.nome.trim();
  if (typeof data.name === "string" && data.name.trim()) return data.name.trim();

  const keys = Object.keys(data).filter((key) => key !== "reservado");
  for (const key of keys) {
    const value = data[key];
    if (typeof value === "string" && value.trim()) return value.trim();
  }
  return id;
};

const setStatus = (message, color = "#333") => {
  if (!status) return;
  status.textContent = message;
  status.style.color = color;
};

const renderLista = () => {
  if (!listaDisponiveis || !listaEscolhidos) return;

  const disponiveis = currentDocs.filter((docItem) => !docItem.data.reservado);
  const escolhidos = currentDocs.filter((docItem) => docItem.data.reservado);

  if (!disponiveis.length) {
    listaDisponiveis.innerHTML = `<p style="text-align:center;color:#999;">Nenhum presente disponível.</p>`;
  } else {
    listaDisponiveis.innerHTML = disponiveis
      .map((docItem) => {
        const nome = getPresentName(docItem.data, docItem.id);
        return `
          <div class="presente-item">
            <p style="margin:0;"><strong>${nome}</strong></p>
            <button class="instant-confirm-button" data-id="${docItem.id}" data-nome="${nome}">
              Escolher
            </button>
          </div>
        `;
      })
      .join("");
  }

  if (!escolhidos.length) {
    listaEscolhidos.innerHTML = `<p style="text-align:center;color:#999;">Nenhum presente escolhido ainda.</p>`;
  } else {
    listaEscolhidos.innerHTML = escolhidos
      .map((docItem) => {
        const nome = getPresentName(docItem.data, docItem.id);
        return `
          <div class="presente-item" style="background:#f9f9f9;">
            <p class="texto-escolhido"><strong>${nome}</strong></p>
            <span class="badge-colhido">Escolhido</span>
          </div>
        `;
      })
      .join("");
  }
};

const refreshData = async () => {
  try {
    setStatus("Carregando lista...", "#333");
    const snapshot = await getDocs(collection(db, "presentes"));
    currentDocs = snapshot.docs.map((docItem) => ({ id: docItem.id, data: docItem.data() }));
    renderLista();
    setStatus("Lista atualizada.", "#333");
  } catch (error) {
    setStatus("Erro ao carregar lista.", "#c0392b");
    console.error(error);
  }
};

const confirmPresent = async (id) => {
  if (!id) return;
  try {
    setStatus("Salvando sua escolha...", "#333");
    const documento = doc(db, "presentes", id);
    await updateDoc(documento, { reservado: true });
    await refreshData();
    setStatus("Presente escolhido com sucesso! Obrigado! ❤️", "#2d8f2d");
  } catch (error) {
    setStatus("Erro ao salvar escolha.", "#c0392b");
    console.error(error);
  }
};

// Evento que escuta o clique no botão "Escolher" e envia direto para o Firebase
listaDisponiveis?.addEventListener('click', (event) => {
  const button = event.target.closest('.instant-confirm-button');
  if (!button) return;

  const id = button.dataset.id;
  const nomePresente = button.dataset.nome;

  const perguntar = confirm(`Você deseja mesmo escolher o presente: "${nomePresente}"?`);
  if (perguntar) {
    confirmPresent(id);
  }
});

const loadData = async () => {
  await refreshData();
  
  // Realtime ligado: se outra pessoa escolher em outro celular, atualiza na hora
  onSnapshot(collection(db, "presentes"), (snapshot) => {
    currentDocs = snapshot.docs.map((docItem) => ({ id: docItem.id, data: docItem.data() }));
    renderLista();
  });
};

loadData();
refreshButton?.addEventListener('click', refreshData);
</script>
</body>
</html>
